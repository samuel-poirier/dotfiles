[general]
# Exit directly after copy/save action
early-exit = true
# Don't save to Pictures when copying to clipboard
save-after-copy = false
output-filename = "/tmp/satty/satty-screenshot-%Y-%m-%d_%H:%M:%S.png"

[color-palette]
# Red will be the first (default) color shown in the toolbar
palette = [
    "#ff0000",
    "#ffff00",
    "#00ff00",
    "#0000ff",
    "#ffffff",
    "#000000",
]

# Tool selection keyboard shortcuts
[keybinds]
pointer = "p"
crop = "c"
brush = "b"
line = "i"
arrow = "a"
rectangle = "r"
ellipse = "e"
text = "t"
marker = "m"
blur = "u"
highlight = "g"
